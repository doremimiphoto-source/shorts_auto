# ==================== Shorts Auto Pipeline 설정 ====================
# 이 파일을 `config.yaml`로 복사한 뒤 환경에 맞게 수정한다.
# 비밀 정보(API 키)는 본 파일이 아닌 `.env`에 저장한다.
# ===================================================================

app:
  name: shorts-auto
  version: 1.0.0
  timezone: Asia/Seoul
  channel_name: 도도레미

# ---------- 파이프라인 (FR-7) ----------
pipeline:
  daily_target_count: 3                # 일 업로드 목표 (KPI: 3개월 3건/일, 6개월 5건/일)
  schedule_times: ["07:00", "15:30", "18:00", "22:00"]   # KST 기준 실행 시각 (Windows 작업 스케줄러)
  upload_jitter_minutes: 20            # 업로드 간격 ±20분 랜덤화 (FR-6.9)
  lock_file: data/pipeline.lock
  killswitch_file: data/killswitch.flag

# ---------- 소재 수집 (FR-1) ----------
crawler:
  motif_min_length: 200
  motif_max_length: 1500
  rate_limit_seconds: 3                # 도메인별 1 req / 3 sec (FR-1.4)
  user_agent: "ShortsAutoBot/1.0 (+https://example.com/contact)"
  retry_max: 3
  retry_backoff_base: 2                # 지수 백오프 base (sec)
  raw_text_retention_hours: 24         # 원문 24시간 내 자동 삭제 (FR-1.6)
  duplicate_threshold_cosine: 0.85     # ko-sroberta 임베딩 코사인 유사도 (FR-1.5)
  sources:
    # 1순위: LLM 완전 창작 (테마/키워드만 입력)
    - kind: llm_creator
      enabled: true
      themes:
        # ══ TIER 1: A vs B 비교형 ══ (채널 1위 포맷 — 플래너 vs 앱 1,415조회)
        - 공부 앱 vs 종이 플래너 — 성적 올리는 진짜 방법
        - 혼자 공부 vs 스터디카페 — 집중력 어디가 더 높을까
        - 음악 들으며 공부 vs 조용히 공부 — 뭐가 더 효율적일까
        - 교재 정독 vs 기출 반복 — 시험 점수를 더 올리는 방법
        - 밤 공부 vs 아침 공부 — 중학생에게 맞는 시간은
        - 형광펜 vs 손필기 — 기억에 더 오래 남는 필기법
        - 유튜브 강의 vs 교과서 — 수행평가 공부 어떻게 해야 할까
        - 오답노트 vs 기출 반복 — 성적 올리는 진짜 방법
        - 학원 vs 인강 — 중학생 자기에게 맞는 선택 기준
        - 짧게 자주 vs 길게 한 번 — 더 효율적인 복습 주기는

        # ══ TIER 2: 루틴·기법형 ══ (2~3위 포맷 — 포모도로 770·루틴 582조회)
        - 포모도로 기법 변형 — 중학생 맞춤 25+5 루틴 완전판
        - 중학생 하루 공부 루틴 — 아침부터 취침까지 시간표
        - 시험 1주일 전 루틴 — 지금 당장 따라 하는 기말 대비법
        - 시험 전날 밤 최적 루틴 — 밤새지 말고 이렇게 해라
        - 아침 5분 루틴으로 하루 공부 효율 높이는 법
        - 공부 집중력 10배 높이는 환경 세팅 루틴
        - 학교·학원·자습 3분할 시간표 설계 루틴
        - 기말고사 3주 전 과목별 공부 로드맵 루틴

        # ══ TIER 3: 수행평가 특화 ══ (4~5위 포맷 — 537·449조회)
        - 과학 수행평가 광물 보고서 만점 서술 포인트
        - 중국어 수행평가 발화 단기 완성 — 발음 교정 핵심
        - 국어 수행평가 서술형 고득점 답안 작성 공식
        - 영어 말하기 수행평가 단기 특훈 — 발음·유창성 올리기
        - 도덕 수행평가 도덕적 추론 서술형 고득점 공식
        - 체육 수행평가 에어로빅 완성도 높이는 연습 루틴
        - 역사 수행평가 독후감 핵심 구조 — 감동 포인트 쓰는 법
        - 수학 수행평가 인생그래프 — 창의성·감동 살리는 구성법
        - 한문 수행평가 창의 한자 — 아이디어 도출 꿀팁
        - 음악 수행평가 칼림바 단기 마스터 루틴

        # ══ TIER 4: 공부법·암기 ══
        - 단기 암기 비법 — 두문자법·연상법으로 30분 만에 외우기
        - 영단어 암기 효율 극대화 — 하루 20개 자동화 루틴
        - 기말고사 과목별 암기 특화법 — 역사·생물·사회 핵심 개념
        - 시험 전날 망각 곡선 역이용 — 기억 유지 극대화 루틴
        - 중간고사 직후 기말 동시 대비 플랜 — 2주 만에 따라잡기
        - 기출문제로 기말 단기 완성 — 자주 나오는 유형 집중법
        - 수행평가 일정 충돌 시 우선순위 조정법
        - 시험 2주 전·1주 전·3일 전 공부량 배분 전략
    # 2순위: Reddit CC-BY 호환 서브레딧
    - kind: reddit
      enabled: false                   # Reddit API 키 발급 후 true
      subreddits:
        - tifu
        - MaliciousCompliance
        - pettyrevenge

# ---------- 대본 생성 (FR-2) ----------
rewriter:
  # GPU 미보유 환경: 클라우드 무료 API 우선
  primary: gemini                      # gemini | groq | ollama
  fallback_chain: [gemini, groq, ollama]

  gemini:
    model: gemini-2.5-flash
    rpm_limit: 15                      # 자율 제한
    rpd_limit: 1500
    temperature: 0.85
    max_output_tokens: 8192            # 2.5-flash thinking 토큰 예산 포함 (구 SDK: MAX_TOKENS 방지)

  groq:
    model: llama-3.3-70b-versatile
    rpm_limit: 30
    temperature: 0.85
    max_tokens: 2048

  ollama:
    model: gemma2:2b
    base_url: http://127.0.0.1:11434
    temperature: 0.85

  output:
    target_korean_chars: 130           # 20~25초 목표: 130자 ÷ 6.5자/s ≈ 20s (FR-2.1)
    sections: [hook, body, twist]
    section_seconds: { hook: 5, body: 45, twist: 10 }

  similarity:
    motif_max: 0.97                    # 입력 모티프 대비 (FR-2.6); 실측 0.93~0.97 → 0.97 미만만 통과 (완전 복사 ≈1.0 차단)
    recent_30d_max: 0.90               # 과거 30일 대비; 학습팁 도메인 + 데모 스크립트 혼재로 max 유사도 0.86~0.89 실측 → 0.90으로 상향
    lucky_charm_30d_max: 0.93          # lucky_charm 전용 30일 임계값 — 같은 "전설" 포맷 반복이라 구조적으로 유사도 높음 (0.88→0.93)
    cumulative_sample_max: 0.55        # 누적 샘플 100건 평균 (30편+ 규모부터 실질 작동)
    uploaded_max: 0.85                 # 업로드 성공 영상 전체 대비 cosine_max — 동일 컨셉 재생산 차단 (기간 제한 없음)
    embedding_model: jhgan/ko-sroberta-multitask

  hook_patterns:                       # 후킹 다양성 (FR-2.7)
    pool:
      - comparison       # A vs B 비교형 ★ 채널 1위 패턴 (플래너 vs 앱 1,415조회)
      - question         # 질문형
      - second_person    # 너/당신 호명 (공감·직접 호출)
      - number           # 숫자형 (구체적 수치로 신뢰도↑)
      - shock            # 놀람형
      - dialogue         # 대화형
      - confession       # 고백형
      - twist_preview    # 반전 예고형
      - timeline         # 시간순 도입
      # lucky_charm: 실제 조회 27회 — 비활성화
    no_repeat_window: 5                # 직전 5개 대본과 동일 패턴 금지

  content_filter:                      # FR-2.5
    block_keywords_path: prompts/block_keywords.txt

# ---------- TTS (FR-3) ----------
# 한국어 주력 엔진은 MeloTTS-Korean (MIT). Piper 한국어는 상업 사용 가능 모델 부재로 미사용.
# Piper 바이너리는 future-proofing용으로 보관 (영어 voiceover 시 사용 가능).
tts:
  primary: edge
  fallback_chain: [edge, melo]

  melo:                                # MIT, MyShell.ai (사용자 선택)
    language: KR
    device: cpu
    voices:                            # 15~30초 목표 → 빠른 속도 프로파일
      - { id: kr_soft_default, speed: 1.10 }
      - { id: kr_soft_slow,    speed: 1.05 }
      - { id: kr_soft_normal,  speed: 1.15 }
      - { id: kr_soft_brisk,   speed: 1.20 }
      - { id: kr_soft_calm,    speed: 1.08 }

  piper:                               # 한국어 미지원 — 영어용으로만 사용 가능 (보관)
    enabled: false
    bin: models/piper/bin/piper.exe
    voices: []                         # 한국어 voice가 추가될 때 등록

  edge:                                # Microsoft Neural TTS — 감성 명언 채널 주력
    enabled: true
    voices:
      - ko-KR-SunHiNeural              # 여성 단독 사용 (가장 자연스러운 한국어)
    consecutive_403_429_threshold: 5   # 누적 5회 차단 감지 시 melo 폴백 (FR-3.7)

  audio:
    sample_rate: 24000
    channels: 1
    format: mp3
    target_lufs: -16                   # 음량 정규화 (FR-3.4)
    target_duration_min: 15            # 15~30초 Shorts 최적 (FR-3.5)
    target_duration_max: 30

  speaker_rotation:
    deterministic_by_content_hash: true
    min_distinct_in_recent_n: 3        # 직전 3개와 다른 화자 강제 (FR-3.3)

# ---------- 자막 (FR-4) ----------
subtitle:
  whisper:
    model_size: small                  # CPU only: small 권장 (large-v3는 GPU 필요)
    compute_type: int8                 # CPU 최적화
    language: ko
    vad_filter: true
    beam_size: 5
  format:
    max_lines: 1
    max_chars_per_line: 10
    keyword_mode: true                 # 나레이션 전문 대신 핵심 키워드만 표시
    keyword_emphasis: true
  output_dir: output/subtitle

# ---------- 영상 합성 (FR-5) ----------
renderer:
  resolution: { width: 1080, height: 1920 }
  fps: 30
  video_codec: libx264
  video_crf: 18
  video_preset: fast
  audio_codec: aac
  audio_bitrate: 256k
  max_duration_seconds: 58             # Shorts 최대 60초, 여유 2초
  channel_logo: assets/channel_logo.jpg

  background:
    pool_dir: assets/bg_video
    min_pool_size: 100                 # FR-5.4
    reuse_min_interval_days: 7
    randomize:
      crop: true
      color_grade: true
      speed_jitter: 0.05               # ±5%

  bgm:
    pool_dir: assets/bgm
    min_pool_size: 30                  # FR-5.5
    duck_db: -22                       # 사이드체인 더킹 — 나레이션 명료도 우선 (FR-5.3)
    blacklist_path: data/bgm_blacklist.json
    content_id_check_after_minutes: 10 # 업로드 후 검사 (A10)

    # 풀 빌드 전략 (3-Tier Hybrid). 런타임 영상 합성은 풀에서만 선택한다.
    # 풀 보강은 scripts/fetch_assets.py 로 별도 실행:
    #   - tier1 (musicgen): python -m scripts.fetch_assets bgm-musicgen --per-mood 3
    #   - tier2 (ia):       python -m scripts.fetch_assets bgm-ia --per-mood 5
    #   - tier3 (yt):       YouTube 오디오 라이브러리 수동 다운로드 (SETUP.md §5.3)
    pool_strategy:
      tier1_musicgen:
        enabled: true
        model_id: facebook/musicgen-small
        per_mood: 3                    # 무드당 클립 수
        duration_sec: 30
        license: "Apache 2.0 model; generated audio is free"
      tier2_internet_archive:
        enabled: true
        per_mood: 5
        license_filter: publicdomain   # 공식 PD 항목만
      tier3_youtube_audio_library:
        enabled: true
        manual_only: true              # API 미제공 → 수동 다운로드만

  subtitle_burn_in:
    engine: libass                     # FR-5.7 / ASS 스타일 자막
    fonts_dir: assets/fonts            # Pretendard, Gowun Dodum 등 보관
    # 구간별 스타일은 whisper_engine.py _TAG_HOOK/BODY/TWIST 에서 관리
    # hook : Pretendard ExtraBold 92px 흰색 Y=760 fad(300,200)
    # body : Pretendard Bold      70px 흰색 Y=920 fad(250,200)
    # twist: Pretendard Black     88px 노랑 Y=920 fad(300,300)

  validation:                          # FR-5.8
    duration_tolerance_seconds: 2
    expected_resolution: [1080, 1920]
    audio_lufs_min: -16
    audio_lufs_max: -14
    rerender_on_fail: true
    rerender_max: 1

  output:
    final_dir: output/final
    retain_days: 7                     # 7일 후 자동 삭제

# ---------- 업로드 (FR-6) ----------
uploader:
  api:
    daily_quota_units: 10000           # FR-6.7
    upload_cost_units: 1600            # 1건당
    safety_margin_units: 1000

  metadata:
    title_suffix: " #Shorts"           # FR-6.3
    description_template_path: prompts/upload_description.txt
    category_id: 22                    # 22 = People & Blogs (FR-6.5)
    made_for_kids: false               # FR-6.6
    self_declared_made_for_kids: false
    privacy_status: public             # public | unlisted | private

  ai_disclosure:                       # FR-6.8
    description_prefix: "본 영상은 AI 음성·각색을 사용했습니다."
    required_hashtags: ["#AI", "#AIVoice"]
    studio_ui_toggle: true             # Playwright 자동화로 altered/synthetic content 토글

  oauth_clients:                       # FR-6.10 채널 분리 시 다중 등록
    - name: default
      client_secret_env: YOUTUBE_CLIENT_SECRET_PATH
      token_env: YOUTUBE_TOKEN_PATH

# ---------- 로깅·모니터링 (FR-8) ----------
observability:
  log_dir: logs
  log_format: jsonl                    # FR-8.1
  rotation: daily                      # YYYY-MM-DD.log
  errors_dir: logs/errors
  daily_report: true                   # FR-8.3
  pii_mask_patterns:                   # A5
    - refresh_token
    - access_token
    - Authorization
    - email

  notify:
    discord_enabled: true
    telegram_enabled: false
    on_levels: [ERROR, CRITICAL]

# ---------- Kill-Switch (§12) ----------
killswitch:
  ctr_7d_threshold: 0.01               # 7일 평균 CTR < 1%
  retention_7d_threshold: 0.30         # 시청 지속률 < 30%
  policy_warning_immediate: true       # 정책 경고 1건 = 즉시 중단
  upload_failure_rate_2d: 0.50         # 2일 연속 50% 초과 실패
  cumulative_similarity_threshold: 0.6
  bgm_match_rate_monthly: 0.10         # > 10% 시 BGM 풀 재검증

# ---------- 컴플라이언스 (§3.5) ----------
compliance:
  daily_check_enabled: true
  same_speaker_consecutive_max: 3
  bg_video_reuse_min_days: 7
  recent_30d_avg_similarity_max: 0.6

# ---------- 시험 기간 행운 부적 (계절 콘텐츠) ----------
# 시험 기간 ±lucky_charm_lead_days 이내에 lucky_charm_themes가 테마 풀에 자동 추가된다.
# lucky_charm_ratio: 시험 기간 중 부적 테마가 선택될 확률 (0.3 = 약 30%)
exam_season:
  lucky_charm_lead_days: 7
  lucky_charm_ratio: 0.0            # 0%: 채널 실데이터 27조회 — 완전 비활성화
  periods:
    - { name: 1학기_중간고사, start: "04-20", end: "05-10" }
    - { name: 1학기_기말고사, start: "06-20", end: "07-10" }
    - { name: 2학기_중간고사, start: "09-20", end: "10-15" }
    - { name: 2학기_기말고사, start: "11-20", end: "12-10" }
  lucky_charm_themes:
    - "시험 행운 부적 — 이 영상을 10명에게 공유하면 모든 시험 만점 전설"
    - "수능·기말 직전 행운의 부적 — 공유하면 시험 운이 열린다는 전설"
    - "중간고사 시험 운 부적 — 친구 10명에게 전달하면 전 과목 만점 설"
    - "기말고사 합격 기원 부적 — 지금 바로 10명에게 전달해야 효험이 있다"

# ---------- 데이터베이스 ----------
database:
  path: data/shorts.db
  wal_mode: true                       # A2
  wal_autocheckpoint: 1000
  backup:
    enabled: true
    interval_hours: 24                 # 일간 .backup 명령 (A12)
    retain_days: 7
    output_dir: data/backups
