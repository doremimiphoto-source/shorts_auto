# ==================== Shorts Auto Pipeline 설정 ====================
# 이 파일을 `config.yaml`로 복사한 뒤 환경에 맞게 수정한다.
# 비밀 정보(API 키)는 본 파일이 아닌 `.env`에 저장한다.
# ===================================================================

app:
  name: shorts-auto
  version: 1.0.0
  timezone: Asia/Seoul
  channel_name: 도도레미

# ---------- 파이프라인 (FR-7) ----------
pipeline:
  daily_target_count: 4                # 일 업로드 상한 = 스케줄 배치 수와 동일 (07·15:30·18·22시)
  schedule_times: ["07:00", "15:30", "18:00", "20:00"]   # KST 기준 실행 시각 (Windows 작업 스케줄러)
  upload_jitter_minutes: 20            # 업로드 간격 ±20분 랜덤화 (FR-6.9)
  lock_file: data/pipeline.lock
  killswitch_file: data/killswitch.flag

# ---------- 소재 수집 (FR-1) ----------
crawler:
  motif_min_length: 200
  motif_max_length: 1500
  rate_limit_seconds: 3                # 도메인별 1 req / 3 sec (FR-1.4)
  user_agent: "ShortsAutoBot/1.0 (+https://example.com/contact)"
  retry_max: 3
  retry_backoff_base: 2                # 지수 백오프 base (sec)
  raw_text_retention_hours: 24         # 원문 24시간 내 자동 삭제 (FR-1.6)
  duplicate_threshold_cosine: 0.78     # ko-sroberta 임베딩 코사인 유사도 (FR-1.5)
  sources:
    # 1순위: LLM 완전 창작 (테마/키워드만 입력)
    - kind: llm_creator
      enabled: true
      themes:
        # ══ [교과별] 과목별 공부법·수행평가 (20개) ══
        - "[교과별] 수학 오답노트 — 같은 실수 반복 차단하는 3단계 루틴"
        - "[교과별] 국어 독해 3분 공식 — 지문 유형별 읽는 순서"
        - "[교과별] 영어 단어 하루 20개 자동 암기 루틴"
        - "[교과별] 과학 개념 연결 학습 — 암기 없이 이해로 푸는 법"
        - "[교과별] 역사 연대기 흐름 암기 — 스토리텔링 기법"
        - "[교과별] 수학 서술형 고득점 — 풀이 과정 서술 공식"
        - "[교과별] 영어 듣기평가 만점 — 예측 전략과 집중 포인트"
        - "[교과별] 국어 문학·비문학 각각 공략하는 방법"
        - "[교과별] 사회 개념도 그리기로 이해력 높이는 법"
        - "[교과별] 수학 계산 실수 0% — 검산 루틴 3단계"
        - "[교과별] 과학 수행평가 광물 보고서 만점 서술 포인트"
        - "[교과별] 국어 수행평가 서술형 고득점 답안 작성 공식"
        - "[교과별] 영어 말하기 수행평가 — 발음·유창성 단기 올리기"
        - "[교과별] 도덕 수행평가 추론 서술형 — 상황→기준→판단 공식"
        - "[교과별] 역사 수행평가 독후감 — 감동 포인트 쓰는 구조"
